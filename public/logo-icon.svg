<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Rounded square background -->
  <rect x="1" y="1" width="30" height="30" rx="7" fill="#0A0F18" stroke="#1E293B" stroke-width="1"/>
  <!-- Crosshair circles -->
  <circle cx="16" cy="16" r="8" stroke="#334155" stroke-width="1.5" fill="none"/>
  <circle cx="16" cy="16" r="3" stroke="#334155" stroke-width="1.5" fill="none"/>
  <!-- Crosshair lines -->
  <line x1="16" y1="4" x2="16" y2="11" stroke="#334155" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="21" x2="16" y2="28" stroke="#334155" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="4" y1="16" x2="11" y2="16" stroke="#334155" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="21" y1="16" x2="28" y2="16" stroke="#334155" stroke-width="1.5" stroke-linecap="round"/>
  <!-- LOS line — the hero element, brand blue diagonal -->
  <line x1="7" y1="25" x2="25" y2="7" stroke="#0066FF" stroke-width="2.5" stroke-linecap="round"/>
  <!-- LOS line endpoints — site markers -->
  <circle cx="7" cy="25" r="2.5" fill="#0066FF"/>
  <circle cx="25" cy="7" r="2.5" fill="#0066FF"/>
</svg>
